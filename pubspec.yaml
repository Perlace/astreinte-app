name: astreinte_app
description: Gestionnaire de notifications pour les astreintes o2switch

publish_to: 'none'
version: 1.4.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Stockage local
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Notifications & permissions
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.4
  # Tâches en arrière-plan
  workmanager: ^0.9.0
  # Navigation
  go_router: ^14.6.2
  # UI
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1
  table_calendar: ^3.1.2
  # iOS Shortcuts deep link
  url_launcher: ^6.3.1
  # Date/heure
  intl: ^0.19.0
  # HTTP pour API VPN
  http: ^1.2.0
  # VPN WireGuard
  wireguard_flutter: ^0.1.3
  # Partage de fichiers
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
